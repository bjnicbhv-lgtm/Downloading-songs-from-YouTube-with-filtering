name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install yt-dlp and ffmpeg
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Download Video
        env:
          YT_URL: ${{ github.event.inputs.yt_urls }}
          YT_FORMAT: ${{ github.event.inputs.format }}
        run: |
          mkdir -p yt_output
          
          # יצירת קובץ עוגיות בצורה בטוחה יותר
          cat <<EOF > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF
          
          # בדיקה אם הקובץ נוצר ולא ריק
          if [ ! -s cookies.txt ]; then
            echo "Warning: cookies.txt is empty or not found. Check your YT_COOKIES secret."
          fi

          if [ "$YT_FORMAT" = "mp3" ]; then
            echo "מתחיל הורדת MP3..."
            yt-dlp -v --cookies cookies.txt \
              --no-playlist \
              -x --audio-format mp3 \
              --embed-thumbnail --add-metadata \
              -o "yt_output/%(title)s.%(ext)s" \
              "$YT_URL"
          else
            echo "מתחיל הורדת MP4..."
            yt-dlp -v --cookies cookies.txt \
              --no-playlist \
              -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              --embed-thumbnail --add-metadata \
              -o "yt_output/%(title)s.%(ext)s" \
              "$YT_URL"
          fi
          
          rm cookies.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "download-${{ github.run_id }}-${{ github.run_number }}"
          name: "YouTube Download ${{ github.run_id }}"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
