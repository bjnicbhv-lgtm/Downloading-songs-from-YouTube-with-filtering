name: "Downloading songs from YouTube with filtering"

on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Download Video & Set Metadata
        run: |
          mkdir -p yt_output
          
          # יצירת קובץ עוגיות
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          sed -i '/^$/d' cookies.txt

          FORMAT="${{ github.event.inputs.format }}"
          URL="${{ github.event.inputs.yt_urls }}"
          
          # הגדרות בסיסיות ל-yt-dlp
          ARGS="--cookies cookies.txt --no-playlist --extractor-args youtube:player_client=android,web --restrict-filenames"
          
          if [ "$FORMAT" = "mp3" ]; then
            # הורדה כ-MP3 עם הטמעת מטא-דאטה
            yt-dlp $ARGS -x --audio-format mp3 --add-metadata --embed-thumbnail -o "yt_output/%(title)s.%(ext)s" "$URL"
          else
            # הורדה כ-MP4
            # שלב א': הורדה רגילה
            yt-dlp $ARGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 -o "temp_video.%(ext)s" "$URL"
            
            # שלב ב': שליפת הכותרת לתוך משתנה (כדי להשתמש בה ב-ffmpeg כמו שביקשת)
            VIDEO_TITLE=$(yt-dlp --get-title --no-playlist "$URL")
            
            # שלב ג': שימוש ב-ffmpeg להוספת מטא-דאטה ושמירה בשם הנכון (ללא קידוד מחדש)
            ffmpeg -i temp_video.mp4 -metadata title="$VIDEO_TITLE" -c copy "yt_output/$VIDEO_TITLE.mp4"
            
            rm temp_video.mp4
          fi
          
          rm cookies.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "v${{ github.run_number }}" 
          name: "הורדה מספר ${{ github.run_number }}"
          body: "הקובץ מוכן להורדה עם מטא-דאטה מעודכן."
          token: ${{ secrets.GITHUB_TOKEN }}
