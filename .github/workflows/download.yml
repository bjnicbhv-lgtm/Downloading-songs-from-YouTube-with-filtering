name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        [cite_start]uses: actions/checkout@v4 [cite: 2]

      - name: 2. Install Dependencies
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp 
          sudo chmod a+rx /usr/local/bin/yt-dlp 
          sudo apt-get update && sudo apt-get install -y ffmpeg 

      - name: 3. Download Video and Get Title
        id: download_step
        run: |
          mkdir -p yt_output [cite: 4]
          
          cat <<EOF > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF
          [cite_start]sed -i '/^$/d' cookies.txt [cite: 5]

          FORMAT="${{ github.event.inputs.format }}"
          URL="${{ github.event.inputs.yt_urls }}"
          [cite_start]ARGS="--cookies cookies.txt --no-playlist --extractor-args youtube:player_client=android,web --js-runtimes node" [cite: 5]
          
          # שליפת שם הסרטון בצורה בטוחה
          VIDEO_TITLE=$(yt-dlp $ARGS --get-title "$URL")
          [cite_start]echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT [cite: 3]

          [cite_start]if [ "$FORMAT" = "mp3" ]; then [cite: 6]
            [cite_start]yt-dlp $ARGS -x --audio-format mp3 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL" [cite: 7]
          else
            [cite_start]yt-dlp $ARGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL" [cite: 7]
          fi
          
          rm cookies.txt

      - name: 4. Create Unique Release
        [cite_start]uses: ncipollo/release-action@v1 [cite: 8]
        with:
          artifacts: "yt_output/*"
          tag: "run-${{ github.run_number }}"
          name: "${{ steps.download_step.outputs.video_title }} (#${{ github.run_number shadow}})"
          body: "הקובץ מוכן להורדה."
          [cite_start]token: ${{ secrets.GITHUB_TOKEN }} [cite: 9]
