name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        [cite_start]uses: actions/checkout@v4 [cite: 2, 11]

      - name: 2. Install Dependencies
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp [cite: 3, 12]
          sudo chmod a+rx /usr/local/bin/yt-dlp [cite: 3, 12]
          sudo apt-get update && sudo apt-get install -y ffmpeg [cite: 3, 12]

      - name: 3. Download Video and Extract Title
        id: download_step
        run: |
          mkdir -p yt_output [cite: 4, 13]
          
          cat <<EOF > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF
          [cite_start]sed -i '/^$/d' cookies.txt [cite: 5]

          [cite_start]FORMAT="${{ github.event.inputs.format }}" [cite: 6, 14]
          [cite_start]URL="${{ github.event.inputs.yt_urls }}" [cite: 6, 14]
          [cite_start]ARGS="--cookies cookies.txt --no-playlist --extractor-args youtube:player_client=android,web --js-runtimes node" [cite: 14]
          
          # רשימת סינון מורחבת (כולל השמות שביקשת)
          [cite_start]BAD_WORDS="פורנו|סקסיה|שירת נשים|זמרת|ווקאלי נשים|sexy|porn|אודיה|נועה קירל|עדן בן זקן|אנה זק|יסמין מועלם|נס ויצי|שרית חדד" [cite: 1, 10]
          FILTER="--match-filter \"title !~* '$BAD_WORDS' & description !~* '$BAD_WORDS'\""

          # ניסיון שליפת שם השיר
          VIDEO_TITLE=$(yt-dlp $ARGS --get-title "$URL" || echo "שגיאה בשליפת השם")
          echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT

          # ניסיון הורדה
          if [ "$FORMAT" = "mp3" ]; then
            [cite_start]yt-dlp $ARGS $FILTER -x --audio-format mp3 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL" || export FAILED=true [cite: 7, 15]
          else
            [cite_start]yt-dlp $ARGS $FILTER -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL" || export FAILED=true [cite: 7, 15]
          fi

          # בדיקה אם ההורדה נכשלה (בגלל סינון או שגיאה) ויצירת קובץ טקסט
          if [ "$FAILED" = "true" ] || [ -z "$(ls -A yt_output)" ]; then
            echo "שיר זה נחסם" > "yt_output/הורדה נכשלה - שיר נחסם.txt"
          fi
          
          rm cookies.txt

      - name: 4. Create Unique Release
        [cite_start]uses: ncipollo/release-action@v1 [cite: 8, 16]
        with:
          [cite_start]artifacts: "yt_output/*" [cite: 8, 16]
          [cite_start]tag: "run-${{ github.run_number }}" [cite: 16]
          [cite_start]name: "${{ steps.download_step.outputs.video_title }} (#${{ github.run_number }})" [cite: 17]
          [cite_start]body: "הקובץ מוכן להורדה." [cite: 17]
          [cite_start]token: ${{ secrets.GITHUB_TOKEN }} [cite: 9, 18]
