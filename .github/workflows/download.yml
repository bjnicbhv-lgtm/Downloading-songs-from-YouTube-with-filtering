name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Download Video
        run: |
          mkdir -p yt_output
          
          # יצירת קובץ עוגיות
          cat <<EOF > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF
          sed -i '/^$/d' cookies.txt

          URL="${{ github.event.inputs.yt_urls }}"
          FORMAT="${{ github.event.inputs.format }}"
          
          # --- רשימת מילים לחסימה ב-Metadata ---
          BLOCK_LIST="יהודה|סקס|פורנו|sex|porn"
          # ---------------------------------------

          # הגדרות כלליות
          # הוספתי --ignore-errors כדי שאם סרטון אחד נחסם בפלייליסט, הוא ימשיך לאחרים
          ARGS="--cookies cookies.txt --no-playlist --ignore-errors --extractor-args youtube:player_client=android,web --js-runtimes node --embed-thumbnail --add-metadata"
          
          # סינון משולב: בודק גם כותרת (title) וגם תיאור (description)
          # (?i) הופך את זה ללא רגיש לאותיות גדולות/קטנות
          FILTER="title!~*(?i)($BLOCK_LIST) & description!~*(?i)($BLOCK_LIST)"

          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp $ARGS --match-filter "$FILTER" -x --audio-format mp3 -o "yt_output/%(title)s.%(ext)s" "$URL"
          else
            yt-dlp $ARGS --match-filter "$FILTER" -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 -o "yt_output/%(title)s.%(ext)s" "$URL"
          fi
          
          rm cookies.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "v${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: "הקובץ מוכן להורדה."
          token: ${{ secrets.GITHUB_TOKEN }}
