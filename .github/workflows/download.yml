name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Download Video and Extract Title
        id: download_step
        run: |
          mkdir -p yt_output
          
          cat <<EOF > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF
          sed -i '/^$/d' cookies.txt

          FORMAT="${{ github.event.inputs.format }}"
          URL="${{ github.event.inputs.yt_urls }}"
          ARGS="--cookies cookies.txt --no-playlist --extractor-args youtube:player_client=android,web --js-runtimes node"
          
          # רשימת סינון (מילים אסורות)
          BAD_WORDS="פורנו|סקסיה|שירת נשים|זמרת|ווקאלי נשים|sexy|porn|אודיה|נועה קירל|עדן בן זקן|אנה זק|יסמין מועלם|נס ויצי|שרית חדד"
          FILTER="--match-filter \"title !~* '$BAD_WORDS' & description !~* '$BAD_WORDS'\""

          # שליפת שם השיר מיוטיוב לצורך הכותרת
          VIDEO_TITLE=$(yt-dlp $ARGS --get-title "$URL" || echo "שגיאה בשליפת השם")
          echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT

          # ניסיון הורדה - שמירת הלוג לקובץ כדי לבדוק אם נחסם בגלל סינון
          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp $ARGS $FILTER -x --audio-format mp3 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL" > download_log.txt 2>&1 || true
          else
            yt-dlp $ARGS $FILTER -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL" > download_log.txt 2>&1 || true
          fi

          # בדיקה אם ההורדה נכשלה ספציפית בגלל ה-filter
          if grep -q "does not pass filter" download_log.txt; then
            echo "שיר זה נחסם" > "yt_output/הורדה נכשלה - שיר נחסם.txt"
          elif [ -z "$(ls -A yt_output)" ]; then
            echo "התרחשה שגיאה טכנית בהורדה (לא קשור לסינון)."
            exit 1
          fi
          
          rm cookies.txt download_log.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "run-${{ github.run_number }}"
          name: "${{ steps.download_step.outputs.video_title }} (#${{ github.run_number }})"
          body: "הקובץ מוכן להורדה."
          token: ${{ secrets.GITHUB_TOKEN }}
