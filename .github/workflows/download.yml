name: "Fast YT Downloader"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Tools
        run: |
          # התקנה מהירה רק אם חסר
          if ! command -v yt-dlp &> /dev/null; then
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
          fi

      - name: 3. Download
        run: |
          mkdir -p out
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          
          # הגדרת הגדרות מהירות לפי הפורמט
          if [ "${{ github.event.inputs.format }}" = "mp3" ]; then
            OPTS="-x --audio-format mp3"
          else
            OPTS="-f bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best --merge-output-format mp4"
          fi

          # הורדה ישירה ללא סינונים
          yt-dlp --cookies cookies.txt --no-playlist $OPTS \
            --embed-thumbnail --add-metadata \
            -o "out/%(title)s.%(ext)s" "${{ github.event.inputs.yt_urls }}"
          
          rm cookies.txt

      - name: 4. Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "out/*"
          tag: "v${{ github.run_number }}"
          name: "הורדה ${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
