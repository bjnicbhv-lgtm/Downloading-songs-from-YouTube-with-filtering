name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

   - name: 2. Install Dependencies (Node.js, yt-dlp, ffmpeg, get-pot)
        run: |
          # התקנת Node.js ישירות מהמאגרים של אובונטו
          sudo apt-get update
          sudo apt-get install -y nodejs npm ffmpeg
          
          # התקנת yt-dlp העדכני ביותר
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          
          # התקנת התוסף שהעלית
          pip install yt_dlp_get_pot-0.3.0-py3-none-any.whl
      - name: 3. Download Video
        run: |
          mkdir -p yt_output
          
          FORMAT="${{ github.event.inputs.format }}"
          URL="${{ github.event.inputs.yt_urls }}"
          
          # הגדרות משותפות לעקיפת חסימות בעזרת התוסף שהותקן
          COMMON_ARGS="--no-playlist --extractor-args \"youtube:getpot\""
          
          if [ "$FORMAT" = "mp3" ]; then
            echo "מתחיל הורדת MP3 עם מעקף Get-Pot..."
            yt-dlp $COMMON_ARGS \
              -x --audio-format mp3 \
              --embed-thumbnail --add-metadata \
              -o "yt_output/%(title)s.%(ext)s" \
              "$URL"
          else
            echo "מתחיל הורדת MP4 עם מעקף Get-Pot..."
            yt-dlp $COMMON_ARGS \
              -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              --embed-thumbnail --add-metadata \
              -o "yt_output/%(title)s.%(ext)s" \
              "$URL"
          fi

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "download-${{ github.run_id }}-${{ github.run_number }}"
          name: "הורדה מושלמת - ${{ github.run_id }}"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
