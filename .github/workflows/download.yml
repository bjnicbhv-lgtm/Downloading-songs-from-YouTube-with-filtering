name: "Smart Download: Single MP3 or ZIP"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישורים (מופרדים בפסיקים)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi
          if ! command -v yt-dlp &> /dev/null; then
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
          fi

      - name: 3. Download Videos
        run: |
          mkdir -p yt_output
          
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          FORMAT="${{ github.event.inputs.format }}"
          # הפיכת פסיקים לשורות חדשות כדי לעבור עליהם בלולאה
          echo "${{ github.event.inputs.yt_urls }}" | tr ',' '\n' > urls.txt

          while IFS= read -r URL || [ -n "$URL" ]; do
            CLEAN_URL=$(echo "$URL" | xargs)
            [ -z "$CLEAN_URL" ] && continue
            
            COMMON_ARGS="$COOKIE_ARG --no-playlist --extractor-args youtube:player_client=android,web --js-runtimes node"
            
            if [ "$FORMAT" = "mp3" ]; then
              yt-dlp $COMMON_ARGS -x --audio-format mp3 --embed-thumbnail --add-metadata -o "yt_output/%(title)s.%(ext)s" "$CLEAN_URL"
            else
              yt-dlp $COMMON_ARGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata -o "yt_output/%(title)s.%(ext)s" "$CLEAN_URL"
            fi
          done < urls.txt

      - name: 4. Process Output (Single or ZIP)
        id: process_files
        run: |
          FILE_COUNT=$(ls -1 yt_output | wc -l)
          echo "Found $FILE_COUNT files."
          
          if [ "$FILE_COUNT" -gt 1 ]; then
            echo "Multiple files detected. Zipping..."
            zip -r -j "songs_collection.zip" yt_output/*
            echo "FINAL_ARTIFACT=songs_collection.zip" >> $GITHUB_ENV
          elif [ "$FILE_COUNT" -eq 1 ]; then
            echo "Single file detected."
            # חילוץ שם הקובץ המדויק כולל רווחים
            FILENAME=$(ls -1 yt_output | head -n 1)
            mv "yt_output/$FILENAME" .
            echo "FINAL_ARTIFACT=$FILENAME" >> $GITHUB_ENV
          else
            echo "No files downloaded."
            exit 1
          fi

      - name: 5. Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.FINAL_ARTIFACT }}"
          tag: "v${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: "הקובץ מוכן להורדה משירות הסטרימליט."
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
