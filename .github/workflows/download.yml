name: "Downloading songs from YouTube with filtering"

on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs npm

          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Download Video
        run: |
          mkdir -p yt_output
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

          FORMAT="${{ github.event.inputs.format }}"
          URL="${{ github.event.inputs.yt_urls }}"

          if [ "$FORMAT" = "mp3" ]; then
            echo "מתחיל הורדת MP3..."
            yt-dlp --cookies cookies.txt \
              --extractor-args "youtube:player_client=android" \
              --no-playlist \
              -x --audio-format mp3 \
              --embed-thumbnail --add-metadata \
              -o "yt_output/%(title)s.%(ext)s" \
              "$URL"
          else
            echo "מתחיל הורדת MP4..."
          yt-dlp --cookies cookies.txt \
  --extractor-args "youtube:player_client=android" \
  --no-playlist \
  -f "bestaudio/best" \
  -x --audio-format mp3 \
  --audio-quality 0 \
  --embed-thumbnail --add-metadata \
  -o "yt_output/%(title)s.%(ext)s" \
  "$URL"
          fi

          rm cookies.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "run-${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: true
